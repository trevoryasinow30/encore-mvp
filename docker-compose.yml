version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: encore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: encore
      POSTGRES_PASSWORD: encore123
      POSTGRES_DB: encore_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encore -d encore_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
